app = "kairos-app"
primary_region = "fra"

[deploy]
  release_command = "/app/bin/kairos eval 'Kairos.Release.migrate()'"

[build]

[env]
  PHX_HOST = "kairos-app.fly.dev"
  PORT = "8080"
  MIX_ENV = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
