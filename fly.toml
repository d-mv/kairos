app = "kairos-app"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[checks]]
command = "pnpm --filter @kairos/server smoke"
timeout = 600
interval = "30s"

[[vm]]
memory_mb = 512
cpu_kind = "shared"
cpus = 1
