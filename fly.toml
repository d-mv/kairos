app = "kairos-app"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "get"
path = "/health"
timeout = "5s"

[[vm]]
memory_mb = 512
cpu_kind = "shared"
cpus = 1
